---
name: Update
permissions: {}

env:
  PYTHON_VERSION: '3.14'

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: '0 12 * * *'  # every day at noon UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Wait for approved issue update
        if: github.event_name != 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const {waitForWorkflowJobs} = require('./src/github-scripts/workflow-run-queue.js')
            await waitForWorkflowJobs({
              github,
              context,
              workflowId: 'auto-update-db.yml',
              runTitlePrefix: 'approve-theme ',
              markerStepName: 'Wait for approved database updates'
            })

      - name: Checkout database
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: database
          path: database
          persist-credentials: false  # otherwise, the token used is the GITHUB_TOKEN, instead of the personal token
          fetch-depth: 0  # otherwise, will fail to push refs to dest repo
          filter: blob:none  # full history for rebase, but skip historical file blobs

      - name: Get current date
        id: date
        shell: bash
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> "${GITHUB_OUTPUT}"

          # get yesterday's date for tmdb download
          MONTH=$(date +'%m')
          DAY=$(date +'%d')
          YEAR=$(date +'%Y')
          YESTERDAY=$((DAY-1))
          echo "tmdb_date=${MONTH}_${YESTERDAY}_${YEAR}" >> "${GITHUB_OUTPUT}"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --python "${PYTHON_VERSION}" --no-python-downloads

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Update
        env:
          TMDB_API_KEY_V3: ${{ secrets.TMDB_API_KEY_V3 }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        # only if secrets are available
        if: env.TMDB_API_KEY_V3 != null
        run: |
          # get daily movies list from tmdb
          # wget https://files.tmdb.org/p/exports/movie_ids_${{ steps.date.outputs.tmdb_date }}.json.gz \
          #   -O movies.json.gz

          # get daily collections list from tmdb
          # wget https://files.tmdb.org/p/exports/collection_ids_${{ steps.date.outputs.tmdb_date }}.json.gz \
          #   -O collections.json.gz

          uv run --no-sync python -u ./src/updater.py --daily_update

      - name: Archive database
        shell: bash
        run: |
          7z \
            "-xr!*.git*" \
            a "./build.zip" "./database/*" "./gh-pages-template/*"

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: update
          if-no-files-found: error
          path: |
            ${{ github.workspace }}/build.zip

      - name: GitHub Commit & Push
        if:
          (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions-js/push@5a7cbd780d82c0c937b5977586e641b2fd94acc5  # v1.5
        with:
          author_email: ${{ secrets.GH_BOT_EMAIL }}
          author_name: ${{ vars.GH_BOT_NAME }}
          branch: database
          directory: database
          github_token: ${{ secrets.GH_BOT_TOKEN }}
          message: 'chore: automatic-update-${{ steps.date.outputs.date }}'
          rebase: true

  call-jekyll-build:
    needs: update
    permissions:
      contents: read
    uses: LizardByte/LizardByte.github.io/.github/workflows/jekyll-build.yml@master
    secrets:
      GH_BOT_EMAIL: ${{ secrets.GH_BOT_EMAIL }}
      GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
    with:
      clean_gh_pages: true
      extract_archive: 'build.zip'
      gh_bot_name: ${{ vars.GH_BOT_NAME }}
      site_artifact: 'update'
      target_branch: 'gh-pages'
